services:
  postgres:
    image: postgres:16-alpine
    container_name: lufus_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lufus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-lufus}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lufus} -d ${POSTGRES_DB:-lufus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lufus_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lufus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lufus}?sslmode=require
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?PASSWORD_PEPPER is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NODE_ENV: ${NODE_ENV:-production}
      LUFUS_API_KEY: ${LUFUS_API_KEY}
    profiles:
      - run

volumes:
  postgres_data:
