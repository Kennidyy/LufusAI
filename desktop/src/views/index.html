<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' http://localhost:3001 https://fonts.googleapis.com https://fonts.gstatic.com;">
  <title>LufusAI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="drag-region"></div>
  <div class="window-controls">
    <button class="control-btn minimize" id="minimizeBtn">
      <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" fill="currentColor"/></svg>
    </button>
    <button class="control-btn fullscreen" id="fullscreenBtn">
      <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </button>
    <button class="control-btn close" id="closeBtn">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="2" fill="none"/></svg>
    </button>
  </div>

  <main id="container"></main>

  <script type="module" src="renderer.js"></script>
</body>
</html>
