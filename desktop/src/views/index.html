<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;">
  <title>LufusAI - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="drag-region"></div>
  <div class="window-controls">
    <button class="control-btn minimize" id="minimizeBtn">
      <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" fill="currentColor"/></svg>
    </button>
    <button class="control-btn close" id="closeBtn">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="2" fill="none"/></svg>
    </button>
  </div>

  <main class="login-container">
    <div class="logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="#10A37F" stroke-width="3"/>
        <path d="M14 24C14 18.477 18.477 14 24 14V34C18.477 34 14 29.523 14 24Z" fill="#10A37F"/>
        <circle cx="24" cy="24" r="6" fill="#171717"/>
      </svg>
    </div>
    
    <h1>Bem-vindo ao LufusAI</h1>
    <p class="subtitle">Faça login para continuar</p>

    <form id="loginForm">
      <div class="input-group">
        <input type="email" id="email" placeholder="Email" required autocomplete="email">
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 6L12 13L2 6"/>
          </svg>
        </div>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Senha" required autocomplete="current-password">
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
      </div>

      <div class="options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember">
          <span>Lembrar-me</span>
        </label>
        <a href="#" class="forgot-link">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="login-btn">
        <span>Continuar</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12H19M12 5L19 12L12 19"/>
        </svg>
      </button>

      <div class="divider">
        <span>ou</span>
      </div>

      <button type="button" class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Continuar com Google</span>
      </button>
    </form>

    <p class="signup-link">
      Não tem uma conta? <a href="#">Cadastre-se</a>
    </p>
  </main>

  <script type="module" src="renderer.js"></script>
</body>
</html>
